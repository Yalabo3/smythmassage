function findHeroVideo() {
  var video = document.querySelector('video[data-hero-video]');
  if (video) return video;
  var home = document.getElementById('home');
  if (home) {
    video = home.querySelector('video');
    if (video) return video;
  }
  var source = document.querySelector('video source[src*="hero-video"]');
  return source && source.parentElement ? source.parentElement : null;
}

function initHeroVideo() {
  var video = findHeroVideo();
  if (!video) return false;

  video.muted = true;
  video.loop = true;
  video.playsInline = true;
  video.setAttribute('muted', '');
  video.setAttribute('loop', '');
  video.setAttribute('playsinline', '');

  if (!video.__smythVideoReady) {
    video.__smythVideoReady = true;
    function restartLoop() {
      try { video.currentTime = 0; } catch (e) {}
      var p = video.play();
      if (p && typeof p.catch === 'function') p.catch(function () {});
    }
    video.addEventListener('ended', restartLoop);
    video.addEventListener('timeupdate', function () {
      var d = video.duration;
      if (d && isFinite(d) && video.currentTime >= d - 0.2) restartLoop();
    });
    video.addEventListener('loadedmetadata', function () {
      video.loop = true;
      restartLoop();
    }, { once: true });
  }

  if (video.paused || video.ended) {
    var p = video.play();
    if (p && typeof p.catch === 'function') p.catch(function () {});
  }
  return true;
}

function scheduleHeroVideoInit(attemptsLeft) {
  initHeroVideo();
  if (attemptsLeft <= 0) return;
  setTimeout(function () { scheduleHeroVideoInit(attemptsLeft - 1); }, 500);
}

var smythPatchesApplied = false;
function applySmythDeployPatches() {
  if (smythPatchesApplied) return;
  smythPatchesApplied = true;
  var sectionAbout = document.getElementById('about');
  if (sectionAbout && sectionAbout.querySelector('h2') && sectionAbout.querySelector('h2').textContent.indexOf('Conditions') !== -1) {
    sectionAbout.id = 'services';
  }
  var sectionStaff = document.getElementById('staff');
  if (sectionStaff) sectionStaff.id = 'about';
  var sectionBooking = document.getElementById('booking');
  if (sectionBooking) sectionBooking.id = 'rates';

  var contactSection = document.getElementById('contact');
  var contactHeading = contactSection ? contactSection.querySelector('h2') : null;
  if (contactSection && !document.getElementById('location')) {
    var locationAnchor = document.createElement('div');
    locationAnchor.id = 'location';
    if (contactHeading) contactHeading.parentElement.insertBefore(locationAnchor, contactHeading);
  }

  var logoLink = document.querySelector('nav a[href="#home"]');
  if (logoLink) logoLink.setAttribute('href', '#services');

  var navGroup = document.querySelector('nav > div');
  if (navGroup) {
    navGroup.innerHTML = ''
      + '<a href="#services" data-i18n="nav.services" style="font-size:13px;font-weight:600;letter-spacing:0.03em;color:oklch(78% 0.02 150);">Services</a>'
      + '<a href="#rates" data-i18n="nav.rates" style="font-size:13px;font-weight:600;letter-spacing:0.03em;color:oklch(78% 0.02 150);">Rates</a>'
      + '<a href="#about" data-i18n="nav.about" style="font-size:13px;font-weight:600;letter-spacing:0.03em;color:oklch(78% 0.02 150);">About</a>'
      + '<a href="#location" data-i18n="nav.location" style="font-size:13px;font-weight:600;letter-spacing:0.03em;color:oklch(78% 0.02 150);">Location</a>'
      + '<a href="#contact" data-i18n="nav.contact" style="font-size:13px;font-weight:600;letter-spacing:0.03em;color:oklch(78% 0.02 150);">Contact</a>'
      + '<button type="button" id="lang-toggle" aria-label="Switch language" style="background:transparent;border:1px solid oklch(78% 0.02 150);color:oklch(96% 0.01 90);font-size:12px;font-weight:700;padding:7px 12px;border-radius:6px;cursor:pointer;letter-spacing:0.05em;">FR</button>'
      + '<a href="#" data-book-online data-i18n="cta.bookOnline" style="background:oklch(96% 0.01 90);color:oklch(20% 0.025 155);font-size:13px;font-weight:700;padding:9px 18px;border-radius:6px;text-decoration:none;">Book Online</a>';
  }

  document.querySelectorAll('a[href="#booking"]').forEach(function (el) {
    var label = el.textContent.trim();
    if (label === 'Book Appointment' || label === 'Book Online') {
      el.setAttribute('href', '#');
      el.setAttribute('data-book-online', '');
      el.setAttribute('data-i18n', 'cta.bookOnline');
    } else {
      el.setAttribute('href', '#rates');
    }
  });
  document.querySelectorAll('a[href="#staff"]').forEach(function (el) {
    el.setAttribute('href', '#about');
  });

  document.querySelectorAll('[data-book-online]').forEach(function (el) {
    el.addEventListener('click', function (e) { e.preventDefault(); });
  });

  var servicesHeading = document.querySelector('#services h2');
  if (servicesHeading) servicesHeading.setAttribute('data-i18n', 'section.services');
  var aboutHeading = document.querySelector('#about h2');
  if (aboutHeading) aboutHeading.setAttribute('data-i18n', 'section.about');
  var ratesHeading = document.querySelector('#rates h2');
  if (ratesHeading) ratesHeading.setAttribute('data-i18n', 'section.rates');
  if (contactHeading) contactHeading.setAttribute('data-i18n', 'section.location');

  var STORAGE_KEY = 'smyth-lang';
  var T = {
    en: {
      'nav.services': 'Services',
      'nav.rates': 'Rates',
      'nav.about': 'About',
      'nav.location': 'Location',
      'nav.contact': 'Contact',
      'cta.bookOnline': 'Book Online',
      'section.services': 'Conditions We Treat',
      'section.about': 'Our Therapists',
      'section.rates': 'Fees & Booking',
      'section.location': 'Thurston Drive'
    },
    fr: {
      'nav.services': 'Services',
      'nav.rates': 'Tarifs',
      'nav.about': 'À propos',
      'nav.location': 'Emplacement',
      'nav.contact': 'Contact',
      'cta.bookOnline': 'Réserver en ligne',
      'section.services': 'Conditions traitées',
      'section.about': 'Nos thérapeutes',
      'section.rates': 'Tarifs et réservation',
      'section.location': 'Thurston Drive'
    }
  };

  function applyLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (T[lang] && T[lang][key]) el.textContent = T[lang][key];
    });
    var btn = document.getElementById('lang-toggle');
    if (btn) btn.textContent = lang === 'en' ? 'FR' : 'EN';
  }

  var lang = 'en';
  try { lang = localStorage.getItem(STORAGE_KEY) || 'en'; } catch (e) {}
  applyLang(lang);

  var toggle = document.getElementById('lang-toggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      lang = lang === 'en' ? 'fr' : 'en';
      try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
      applyLang(lang);
    });
  }

  var footer = document.querySelector('footer');
  if (footer && !document.getElementById('yalabo-credit')) {
    var credit = document.createElement('div');
    credit.id = 'yalabo-credit';
    credit.style.marginTop = '10px';
    credit.style.fontSize = '12px';
    credit.style.color = 'oklch(60% 0.02 150)';
    credit.innerHTML = 'Built by <a href="https://yalabo.ca" target="_blank" rel="noopener noreferrer" style="color:oklch(80% 0.06 155);font-weight:600;text-decoration:none;">Yalabo Web Dev</a>';
    footer.appendChild(credit);
  }
}

function scheduleSmythDeployPatches(attemptsLeft) {
  var staffSection = document.getElementById('staff');
  var dcRoot = document.getElementById('dc-root');
  var ready = staffSection || (dcRoot && dcRoot.querySelector('section'));
  if (ready || attemptsLeft <= 0) {
    applySmythDeployPatches();
    scheduleHeroVideoInit(24);
    return;
  }
  setTimeout(function () { scheduleSmythDeployPatches(attemptsLeft - 1); }, 50);
}

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    scheduleSmythDeployPatches(100);
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"font-size:16px; line-height:1.75; color:oklch(40% 0.015 150); max-width:520px; margin:0 0 28px;\">Since we opened our doors in 1998, we have maintained the highest level of quality care. All our therapists are registered with the College of Massage Therapists of Ontario.</p>\n      <div style=\"display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px;\">\n        <a href=\"#booking\" style=\"background:oklch(30% 0.05 155); color:oklch(98% 0.006 85); font-size:14px; font-weight:600; padding:13px 24px; border-radius:6px;\" style-hover=\"background:oklch(24% 0.04 155);\">Book Appointment</a>\n        <a href=\"#booking\" style=\"border:1px solid oklch(70% 0.02 150); color:oklch(24% 0.02 150); font-size:14px; font-weight:600; padding:13px 24px; border-radius:6px;\" style-hover=\"border-color:oklch(46% 0.06 155); color:oklch(30% 0.05 155);\">Buy Gift Certificate</a>\n      </div>\n      <div style=\"font-size:13px; color:oklch(50% 0.015 150);\">Registered Massage Therapists &nbsp;·&nbsp; Direct billing available &nbsp;·&nbsp; 2141 Thurston Drive, Suite 203</div>\n    </div>\n\n    <div style=\"position:relative; width:100%; max-width:360px; justify-self:end;\">\n      <div class=\"hero-video-frame\" style=\"width:100%; aspect-ratio:9/16; border-radius:18px; overflow:hidden; border:1px solid oklch(28% 0.04 155); box-shadow:0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10); background:#0f2318;\">\n        <video id=\"hero-video\" data-hero-video autoplay muted loop playsinline preload=\"metadata\" poster=\"assets/hero-poster.jpg\" style=\"width:100%; height:100%; object-fit:contain; display:block;\">\n          <source src=\"assets/hero-video-grey.mp4\" type=\"video/mp4\">\n        </video>\n      </div>\n      <p style=\"margin:10px 0 0; font-size:12px; font-weight:500; color:oklch(50% 0.04 155); text-align:center; letter-spacing:0.04em; text-transform:uppercase;\">Shoulders &nbsp;·&nbsp; Back &nbsp;·&nbsp; Posture</p>\n    </div>\n  </section>\n\n  <!-- QU erapist\" style=\"width:100%;height:100%;object-fit:cover;object-position:center top;display:block;\" loading=\"lazy\" />\n            </div>\n            <div style=\"padding:16px 18px;\">\n              <div style=\"font-family:'Lora',serif; font-weight:600; font-size:17px; color:oklch(20% 0.02 150); margin-bottom:2px;\">{{ person.name }}</div>\n              <div style=\"font-size:13px; color:oklch(46% 0.015 150); margin-bottom:10px;\">Registered Massage Therapist</div>\n              <a href=\"#staff\" style=\"font-size:13.5px; font-weight:600; color:oklch(38% 0.06 155);\" style-hover=\"color:oklch(28% 0.05 155);\">View Bio →</a>\n            </div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- BOOKING / FEES -->\n  <section id=\"booking\" data-screen-label=\"Booking\" style=\"padding:clamp(32px,4vw,48px) clamp(20px,4vw,56px);\">\n    <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:clamp(32px,4vw,56px);\">\n      <div>\n        <div style=\"width:44px; height:3px; background:oklch(30% 0.05 155); margin-bottom:14px;\"></div>\n        <h2 style=\"font-family:'Lora',serif; font-weight:600; font-size:clamp(1.5rem,2.2vw,2rem); color:oklch(20% 0.02 150); margin:0 0 24px;\">Fees &amp; Booking</h2>\n        <div style=\"display:flex; flex-direction:column; margin-bottom:16px; border-top:1px solid oklch(88% 0.01 90);\">\n          <sc-for list=\"{{ fees }}\" as=\"fee\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid oklch(88% 0.01 90);\">\n              <span style=\"font-size:15.5px; color:oklch(26% 0.015 150);\">{{ fee.label }}</span>\n              <span style=\"font-family:'Lora',serif; font-weight:600; font-size:16px; color:oklch(24% 0.02 150);\">{{ fee.price }}</span>\n            </div>\n          </sc-for>\n        </div>\n        <p style=\"font-size:13.5px; color:oklch(48% 0.015 150); margin:0 0 32px;\">We accept cash, cheque, Visa, Mastercard, E-Transfer, Interac, Amex.</p>\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap;\">\n          <a href=\"#booking\" style=\"background:oklch(30% 0.05 155); color:oklch(98% 0.006 85); font-size:14px; font-weight:600; padding:13px 24px; border-radius:6px;\" style-hover=\"background:oklch(24% 0.04 155);\">Book Appointment</a>\n          <a href=\"#booking\" style=\"border:1px solid oklch(70% 0.02 150); color:oklch(24% 0.02 150); font-size:14px; font-weight:600; padding:13px 24px; border-radius:6px;\" style-hover=\"border-color:oklch(46% 0.06 155); color:oklch(30% 0.05 155);\">Buy Gift Certificate</a>\n        </div>\n      </div>\n\n      <div style=\"display:flex; flex-direction:column; gap:28px;\">\n        <div>\n          <h3 style=\"font-family:'Lora',serif; font-weight:600; font-size:17px; color:oklch(20% 0.02 150); margin:0 0 8px;\">Scheduling</h3>\n          <p style=\"font-size:15px; line-height:1.7; color:oklch(40% 0.015 150); margin:0;\">We now have two convenient ways to schedule your massage session. Use our secure online scheduling system. If you can't find a suitable time or it's an emergency, please call us at (613) 260-2704 and we will return your call as soon as possible.</p>\n        </div>\n        <div>\n          <h3 style=\"font-family:'Lora',serif; font-weight:600; font-size:17px; color:oklch(20% 0.02 150); margin:0 0 8px;\">Cancellation Policy</h3>\n          <p style=\"font-size:15px; line-height:1.7; color:oklch(40% 0.015 150); margin:0;\">We require a 24-Hour Notice for appointment cancellations. If you cancel with less than 24 hours' notice, you will be charged 50% of the scheduled fee. This does not apply to same-day appointments. If you must cancel due to illness or an emergency, please call as soon as possible.</p>\n        </div>\n        <div>\n          <h3 style=\"font-family:'Lora',serif; font-weight:600; font-size:17px; color:oklch(20% 0.02 150); margin:0 0 8px;\">No Show Policy</h3>\n          <p style=\"font-size:15px; line-height:1.7; color:oklch(40% 0.015 150); margin:0;\">If you do not show for your appointment, you will be charged 100% of the scheduled fee.</p>\n        </div>\n      </div>\n    </div>\n  </section>\n\n  <!-- CTA STRIP -->\n  <section data-screen-label=\"CTA\" style=\"background:oklch(20% 0.025 155); padding:22px clamp(20px,4vw,56px); display:flex; gap:20px; flex-wrap:wrap; align-items:center; justify-content:space-between;\">\n    <div>\n      <div style=\"font-family:'Lora',serif; font-weight:600; font-size:18px; color:oklch(97% 0.008 90); margin-bottom:3px;\">Ready to book your massage?</div>\n      <div style=\"font-size:14px; color:oklch(80% 0.02 150);\">Schedule online or call us at <a href=\"tel:6132602704\" style=\"color:oklch(84% 0.06 155); font-weight:600;\">(613) 260-2704</a>.</div>\n    </div>\n    <a href=\"#booking\" style=\"background:oklch(96% 0.01 90); color:oklch(20% 0.025 155); font-size:14px; font-weight:700; padding:12px 26px; border-radius:6px; white-space:nowrap;\" style-hover=\"background:oklch(88% 0.02 150);\">Book Appointment</a>\n  </section>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" data-screen-label=\"Contact\" style=\"background:oklch(94% 0.015 150); padding:clamp(32px,4vw,48px) clamp(20px,4vw,56px);\">\n    <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1.2fr; gap:clamp(32px,4vw,56px); align-items:start;\">\n      <div>\n        <div style=\"width:44px; height:3px; background:oklch(30% 0.05 155); margin-bottom:14px;\"></div>\n        <h2 style=\"font-family:'Lora',serif; font-weight:600; font-size:clamp(1.5rem,2.2vw,2rem); color:oklch(20% 0.02 150); margin:0 0 20px;\">Thurston Drive</h2>\n        <div style=\"display:flex; flex-direction:column; gap:6px; margin-bottom:20px; font-size:15px; color:oklch(30% 0.015 150);\">\n          <div>Phone: <a href=\"tel:6132602704\" style=\"color:oklch(38% 0.06 155
